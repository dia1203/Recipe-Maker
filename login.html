<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Recipe Hub</title>
  <link rel="stylesheet" href="login-style.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <h1>📖 Recipe Hub</h1>
        <button id="themeToggle" class="theme-toggle" onclick="toggleTheme()">
          <span class="theme-icon">🌙</span>
          <span class="theme-text">Dark Mode</span>
        </button>
      </div>
      
      <div class="login-form-container">
        <!-- Login Form -->
        <div id="loginSection" class="auth-section">
          <h2>Welcome Back!</h2>
          <p class="auth-subtitle">Sign in to access your recipe collection</p>

          <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
              <label for="loginUsername">Username or Email</label>
              <input type="text" id="loginUsername" name="username" required
                     placeholder="Enter your username or email">
            </div>

            <div class="form-group">
              <label for="loginPassword">Password</label>
              <input type="password" id="loginPassword" name="password" required
                     placeholder="Enter your password">
            </div>

            <button type="submit" class="auth-btn" id="loginBtn">
              <span class="btn-text">Sign In</span>
              <span class="btn-loading" style="display: none;">🔄 Signing in...</span>
            </button>
          </form>

          <div class="auth-switch">
            <p>Don't have an account? <button type="button" class="switch-btn" onclick="showRegister()">Create Account</button></p>
          </div>
        </div>

        <!-- Registration Form -->
        <div id="registerSection" class="auth-section" style="display: none;">
          <h2>Create Account</h2>
          <p class="auth-subtitle">Join Recipe Hub to start your culinary journey</p>

          <form id="registerForm" onsubmit="handleRegister(event)">
            <div class="form-group">
              <label for="registerUsername">Username</label>
              <input type="text" id="registerUsername" name="username" required
                     placeholder="Choose a username (min 3 characters)" minlength="3">
            </div>

            <div class="form-group">
              <label for="registerEmail">Email</label>
              <input type="email" id="registerEmail" name="email" required
                     placeholder="Enter your email address">
            </div>

            <div class="form-group">
              <label for="registerPassword">Password</label>
              <input type="password" id="registerPassword" name="password" required
                     placeholder="Create a password (min 6 characters)" minlength="6">
            </div>

            <div class="form-group">
              <label for="confirmPassword">Confirm Password</label>
              <input type="password" id="confirmPassword" name="confirmPassword" required
                     placeholder="Confirm your password">
            </div>

            <button type="submit" class="auth-btn" id="registerBtn">
              <span class="btn-text">Create Account</span>
              <span class="btn-loading" style="display: none;">🔄 Creating account...</span>
            </button>
          </form>

          <div class="auth-switch">
            <p>Already have an account? <button type="button" class="switch-btn" onclick="showLogin()">Sign In</button></p>
          </div>
        </div>

        <div id="errorMessage" class="error-message" style="display: none;"></div>
        <div id="successMessage" class="success-message" style="display: none;"></div>
      </div>
    </div>
  </div>

  <script src="login-script.js"></script>
</body>
</html>
